<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GEO診断ツール</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.25.6/babel.min.js"></script>
  <style>
    body{font-family:system-ui,sans-serif;background:#f5f7f9;margin:0;padding:24px;color:#152238}
    .wrap{max-width:860px;margin:0 auto} h1{color:#17a673;font-size:22px}
    h2{font-size:16px;margin:2px 0 8px} .sub{color:#8a97a6;font-size:12px}
    .card{background:#fff;border-radius:14px;padding:18px;margin:14px 0;box-shadow:0 2px 10px rgba(0,0,0,.06)}
    .explain{background:#f0f7f4;border:1px solid #d6ebe1;border-radius:12px;padding:14px 16px}
    .explain dt{font-weight:bold;color:#0f7a54;margin-top:8px} .explain dd{margin:2px 0 0;font-size:13px;line-height:1.7;color:#334}
    input,textarea{padding:9px;border:1px solid #cdd6df;border-radius:8px;width:100%;font-size:14px}
    input.small{padding:6px 8px;font-size:13px}
    button{border:0;border-radius:9px;cursor:pointer;font-size:14px;padding:9px 16px}
    button.primary{background:#17a673;color:#fff;margin-top:10px} button.ghost{background:#eef1f5;color:#334;margin:10px 6px 0 0}
    .flex{display:flex;gap:20px;align-items:center;flex-wrap:wrap}
    .ai{background:linear-gradient(135deg,#eafaf3,#eef4ff);border-left:4px solid #17a673;border-radius:10px;padding:14px}
    .ai h3{margin:0 0 8px;font-size:14px;color:#0f7a54} .ai p{margin:6px 0;line-height:1.7;font-size:14px}
    .barrow{display:flex;align-items:center;gap:10px;margin:7px 0;font-size:13px}
    .barrow .name{width:190px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis} .barrow .val{width:46px;text-align:right;color:#556}
    .track{flex:1;background:#eef1f5;border-radius:6px;height:16px;overflow:hidden} .fill{height:16px;border-radius:6px;transition:width .8s ease}
    .badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:12px;font-weight:bold}
    .sov{display:flex;height:26px;border-radius:8px;overflow:hidden;margin:8px 0}
    .sov span{display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:bold}
    .legend{display:flex;gap:14px;flex-wrap:wrap;font-size:12px;color:#556;margin-top:4px}
    .legend i{display:inline-block;width:10px;height:10px;border-radius:2px;margin-right:4px}
    table{border-collapse:collapse;width:100%;font-size:12.5px} th,td{border:1px solid #e3e8ee;padding:7px;text-align:center} th{background:#eafaf1}
    td.f{text-align:left} th.f{text-align:left}
    .win{background:#e7f7ef;font-weight:bold;color:#0f7a54} .lose{background:#fdeeee;color:#c0392b}
    .note{color:#b5651d;font-size:12px} .muted{color:#8a97a6}
    @media(max-width:640px){body{padding:14px} .wrap{max-width:100%} .barrow .name{width:120px} h1{font-size:19px}
      table{display:block;overflow-x:auto;white-space:nowrap;font-size:12px}}
  </style>
</head>
<body><div style="max-width:880px;margin:0 auto 4px;background:#fff8e1;border:1px solid #f0d98a;border-radius:10px;padding:8px 14px;font:13px system-ui;color:#7a5b00">🔬 <b>デモ版</b>：数値は<b>サンプル（実測・実データではありません）</b>。ロジックの見せ方を確認するためのプロトタイプです。</div>
<div id="root"></div>
<script type="text/plain" id="__jsx">
const FK=["冒頭の結論","見出し構造","箇条書き・表","FAQ","統計・出典","鮮度","定義文"];
const FMAX=[15,15,15,15,20,10,10];
const DEFAULT_URL="https://digitalidentity.co.jp/";
const OWN_DEFAULT=[15,13,4,11,11,8,6];
const COMPS=[
  {f:[15,13,12,12,18,7,5], color:"#e8743b", def:"seo-partner-a.co.jp"},
  {f:[10,9,6,8,10,7,5], color:"#4c8bf5", def:"marketing-b.co.jp"},
  {f:[8,8,4,6,8,6,5], color:"#9b6dd6", def:"web-agency-c.jp"},
];
const KEY="geo_history_v2";
function color(v){return v>=70?"#17a673":v>=50?"#f0a500":"#e0533b";}
function hashStr(s){let h=7;for(let i=0;i<s.length;i++)h=(h*31+s.charCodeAt(i))|0;return Math.abs(h);}
function domainOf(u){try{return new URL(u.trim()).hostname.replace(/^www\./,"");}catch(e){return (u||"自社").trim().replace(/^https?:\/\//,"").split("/")[0]||"自社";}}
function genOwn(url){ if(url.trim()===DEFAULT_URL) return OWN_DEFAULT.slice();
  const seed=hashStr(url); return FMAX.map((m,i)=>Math.max(1,Math.round(m*((((seed>>(i*3))&7)/7)*0.65+0.3)))); }
function tot(f){return f.reduce((a,b)=>a+b,0);}

function Gauge({value}){
  const [d,setD]=React.useState(0);
  React.useEffect(()=>{setD(0);let v=0;const t=setInterval(()=>{v+=2;if(v>=value){v=value;clearInterval(t);}setD(v);},16);return ()=>clearInterval(t);},[value]);
  const r=60,C=2*Math.PI*r,off=C*(1-d/100),col=color(value);
  return (<svg width="150" height="150" viewBox="0 0 150 150">
    <circle cx="75" cy="75" r={r} fill="none" stroke="#eef1f5" strokeWidth="14"/>
    <circle cx="75" cy="75" r={r} fill="none" stroke={col} strokeWidth="14" strokeLinecap="round" strokeDasharray={C} strokeDashoffset={off} transform="rotate(-90 75 75)"/>
    <text x="75" y="72" textAnchor="middle" fontSize="34" fontWeight="bold" fill={col}>{d.toFixed(0)}</text>
    <text x="75" y="95" textAnchor="middle" fontSize="12" fill="#8a97a6">/ 100</text></svg>);
}

function App(){
  const [url,setUrl]=React.useState(DEFAULT_URL);
  const [own,setOwn]=React.useState(OWN_DEFAULT.slice());
  const [names,setNames]=React.useState(COMPS.map(c=>c.def));
  const [hist,setHist]=React.useState(()=>{try{return JSON.parse(localStorage.getItem(KEY)||"[]");}catch(e){return [];}});
  const [saved,setSaved]=React.useState(false);
  const ownDomain=domainOf(url);
  const total=tot(own);
  const sites=[{name:ownDomain,f:own,color:"#17a673",own:true},...COMPS.map((c,i)=>({name:names[i],f:c.f,color:c.color,own:false}))];
  const sumT=sites.reduce((a,s)=>a+tot(s.f),0);
  const withSov=sites.map(s=>({...s,total:tot(s.f),sov:Math.round(tot(s.f)/sumT*100)}));
  const board=[...withSov].sort((a,b)=>b.total-a.total);
  const rank=board.findIndex(b=>b.own)+1;
  const topOther=board.find(b=>!b.own);
  const best=FK.map((k,i)=>({k,r:own[i]/FMAX[i]})).sort((a,b)=>b.r-a.r)[0];
  const worst=FK.map((k,i)=>({k,r:own[i]/FMAX[i]})).sort((a,b)=>a.r-b.r)[0];

  const run=()=>{setOwn(genOwn(url));setSaved(false);};
  const save=()=>{const h=[{ts:new Date().toLocaleString("ja-JP"),url,total,sov:withSov[0].sov},...hist].slice(0,8);setHist(h);localStorage.setItem(KEY,JSON.stringify(h));setSaved(true);};
  const setName=(i,v)=>setNames(names.map((n,j)=>j===i?v:n));
  const prev=hist.length?hist[0].total:null;

  return (<div className="wrap">
    <h1>GEO診断ツール <span className="sub">生成AI検索での「引用されやすさ」を可視化</span></h1>

    <div className="card explain">
      <h2 style={{color:"#0f7a54"}}>このツールの用語</h2>
      <dl>
        <dt>「引用」とは？</dt>
        <dd>ChatGPT・Perplexity・Google AI Overviews などの<b>生成AI検索が回答を作るときに、根拠としてあなたのサイトの内容を参照し、出典として提示すること</b>。GEO(Generative Engine Optimization)は、この“AIに引用されやすい”状態を作る施策です。</dd>
        <dt>「引用シェア(Share of Voice)」とは？</dt>
        <dd>あるトピックのAI回答において、<b>競合を含む複数サイトのうち自社が引用される割合(取り分)</b>。SEOの検索順位に相当する、GEOでの“見え方”の指標です。</dd>
        <dt>「競合」とは？どこを想定？</dt>
        <dd>同じ検索クエリ(例:「GEOとは」「SEO会社 比較」)で<b>一緒にAIに引用される同業サイト</b>です。下の欄で<b>実際の競合ドメインに自由に変更</b>できます(初期値は同業の例)。</dd>
      </dl>
    </div>

    <div className="card">
      <h2>診断対象（自社サイト）</h2>
      <textarea rows="1" value={url} onChange={e=>setUrl(e.target.value)}></textarea>
      <h2 style={{marginTop:12}}>比較する競合サイト（編集できます）</h2>
      {names.map((n,i)=>(<div key={i} style={{display:"flex",alignItems:"center",gap:8,margin:"5px 0"}}>
        <i style={{width:10,height:10,borderRadius:2,background:COMPS[i].color,display:"inline-block"}}></i>
        <input className="small" value={n} onChange={e=>setName(i,e.target.value)} placeholder="競合ドメイン"/></div>))}
      <button className="primary" onClick={run}>GEO診断を実行</button>
      <button className="ghost" onClick={()=>{setUrl(DEFAULT_URL);setOwn(OWN_DEFAULT.slice());setNames(COMPS.map(c=>c.def));setSaved(false);}}>やり直し</button>
      <button className="ghost" onClick={save}>{saved?"保存しました✓":"この結果を保存"}</button>
      {prev!==null && <span className="sub"> 前回 {prev}点 → 今回 {total}点（{total-prev>=0?"+":""}{total-prev}）</span>}
    </div>

    <div className="card flex" style={{justifyContent:"space-between"}}>
      <div style={{textAlign:"center"}}><h2>総合GEOスコア</h2><Gauge value={total}/>
        <div><span className="badge" style={{background:"#eafaf3",color:"#0f7a54"}}>引用シェア {rank}位 / {sites.length}サイト中</span></div></div>
      <div style={{flex:1,minWidth:260}}>
        <div className="ai"><h3>🤖 AI自動分析</h3>
          <p><b>{ownDomain}</b> の総合GEOスコアは <b>{total}点</b>。比較した{sites.length}サイト中<b>{rank}位</b>で、引用シェアは<b>{withSov[0].sov}%</b>。首位「{topOther?topOther.name:"-"}」({topOther?topOther.total:"-"}点)との差は {topOther?topOther.total-total:0}点です。</p>
          <p>強みは「{best.k}」、最も伸びしろが大きいのは「{worst.k}」。</p>
          <p>👉 まず「{worst.k}」を強化すると、AIに引用される確率と引用シェアが上がります。</p>
        </div>
      </div>
    </div>

    <div className="card"><h2>競合比較（総合GEOスコア）</h2>
      {board.map((d,i)=>(<div className="barrow" key={i}>
        <span className="name" style={{fontWeight:d.own?"bold":"normal"}}>{d.name}{d.own?" ★(自社)":""}</span>
        <div className="track"><div className="fill" style={{width:(d.total/board[0].total*100)+"%",background:d.color}}></div></div>
        <span className="val">{d.total}</span></div>))}
    </div>

    <div className="card"><h2>因子別 競合比較（サイト別・7指標）</h2>
      <p className="sub">列見出し＝各サイトのドメイン。緑=自社が最上位 / 赤=自社が最下位。</p>
      <table><thead><tr><th className="f">指標</th><th style={{color:"#0f7a54"}}>{ownDomain}<br/><span className="muted">(自社)</span></th>
        {names.map((n,i)=><th key={i}>{n}</th>)}</tr></thead>
        <tbody>{FK.map((k,i)=>{
          const vals=[own[i],...COMPS.map(c=>c.f[i])];const mx=Math.max(...vals),mn=Math.min(...vals);
          const cls=own[i]===mx?"win":(own[i]===mn?"lose":"");
          return (<tr key={i}><td className="f">{k}<span className="muted"> /{FMAX[i]}</span></td>
            <td className={cls}>{own[i]}</td>{COMPS.map((c,j)=><td key={j}>{c.f[i]}</td>)}</tr>);})}
          <tr><td className="f"><b>合計</b></td><td><b>{total}</b></td>{COMPS.map((c,j)=><td key={j}><b>{tot(c.f)}</b></td>)}</tr>
        </tbody></table>
    </div>

    <div className="card"><h2>引用シェア Share of Voice</h2>
      <p className="sub">生成AI検索で、どのサイトが引用されるかの取り分</p>
      <div className="sov">{[...withSov].sort((a,b)=>b.sov-a.sov).map((s,i)=>(<span key={i} style={{width:s.sov+"%",background:s.color}}>{s.sov>=12?s.sov+"%":""}</span>))}</div>
      <div className="legend">{withSov.map((s,i)=>(<span key={i}><i style={{background:s.color}}></i>{s.name} {s.sov}%</span>))}</div>
    </div>

    {hist.length>0 && <div className="card"><h2>保存した診断履歴（このブラウザに保存）</h2>
      <table><thead><tr><th className="f">日時</th><th className="f">URL</th><th>スコア</th><th>引用シェア</th></tr></thead>
        <tbody>{hist.map((h,i)=>(<tr key={i}><td className="f">{h.ts}</td><td className="f muted">{h.url}</td><td><b>{h.total}</b></td><td>{h.sov}%</td></tr>))}</tbody></table>
      <button className="ghost" onClick={()=>{localStorage.removeItem(KEY);setHist([]);}}>履歴を消去</button></div>}

    <p className="note">※競合スコアは同業ベンチの<b>サンプル</b>です(実クロールではありません)。自社URLを変えて「実行」するとスコアが変化し、競合欄は実名に編集できます。</p>
  </div>);
}
</script>
<script>(function(){var src=document.getElementById("__jsx").textContent;var out=Babel.transform(src,{presets:[["react",{runtime:"classic"}]]}).code;(0,eval)(out);ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));})();</script>
</body></html>
